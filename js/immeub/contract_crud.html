<!DOCTYPE html>
<-- js/immeub/contract_crud.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate MongoDB Contract Manager</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 30px; background: #f9f9f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 30px; color: #2c3e50; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 0.9em; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        button.danger { background: #e74c3c; }
        button.danger:hover { background: #c0392b; }
        .card { background: #f8f9fa; border: 1px solid #e9ecef; padding: 15px; margin-bottom: 15px; border-radius: 6px; position: relative; }
        .delete-btn { position: absolute; top: 15px; right: 15px; }
        select[multiple] { height: 80px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Real Estate Contract Dashboard (MongoDB + Beanie)</h1>

    <div class="grid">
        <!-- SEED DATA PANEL -->
        <div>
            <h2>1. Create Setup Entities</h2>

            <div class="card">
                <h3>Add Person/Tenant</h3>
                <div class="form-group">
                    <label>Name</label><input type="text" id="p_name" placeholder="Alice Smith">
                </div>
                <div class="form-group">
                    <label>Email</label><input type="email" id="p_email" placeholder="alice@example.com">
                </div>
                <button onclick="submitPerson()">Save Person</button>
            </div>

            <div class="card">
                <h3>Add Real Estate Location</h3>
                <div class="form-group">
                    <label>Address</label><input type="text" id="l_addr" placeholder="123 Main St">
                </div>
                <div class="form-group">
                    <label>City</label><input type="text" id="l_city" placeholder="Gotham">
                </div>
                <div class="form-group">
                    <label>Monthly Rent ($)</label><input type="number" id="l_rent" placeholder="1500">
                </div>
                <button onclick="submitLocation()">Save Location</button>
            </div>
        </div>

        <!-- CONTRACT CREATION PANEL -->
        <div>
            <h2>2. Create Contract (Links)</h2>
            <div class="card" style="height: calc(100% - 60px);">
                <div class="form-group">
                    <label>Contract Number</label>
                    <input type="text" id="c_num" placeholder="CNT-2026-X">
                </div>
                <div class="form-group">
                    <label>Select Target Location</label>
                    <select id="c_location"><option value="">-- Loading Locations --</option></select>
                </div>
                <div class="form-group">
                    <label>Select Tenants (Hold Ctrl/Cmd to select multiple)</label>
                    <select id="c_tenants" multiple><option value="">-- Loading Tenants --</option></select>
                </div>
                <button onclick="submitContract()" style="background:#2ecc71; width:100%; margin-top:20px;">Generate Contract Linking Entities</button>
            </div>
        </div>
    </div>

    <!-- CONTRACT DISPLAY PANEL -->
    <h2>Active Enforced Contracts</h2>
    <div id="contracts_list">No active contracts found. Add data above.</div>
</div>

<script>
  const API_URL = "http://127.0.0.1:8000";

  async function loadDropdowns() {
    // Load locations
    const resLoc = await fetch(`${API_URL}/locations`);
    const locations = await resLoc.json();
    const locSelect = document.getElementById('c_location');
    locSelect.innerHTML = locations.map(l => `<option value="${l._id}">${l.address}, ${l.city} ($${l.monthly_rent}/mo)</option>`).join('');

    // Load people
    const resPer = await fetch(`${API_URL}/persons`);
    const persons = await resPer.json();
    const perSelect = document.getElementById('c_tenants');
    perSelect.innerHTML = persons.map(p => `<option value="${p._id}">${p.name} (${p.email})</option>`).join('');
  }

  async function loadContracts() {
    const res = await fetch(`${API_URL}/contracts`);
    const contracts = await res.json();
    const listDiv = document.getElementById('contracts_list');

    if(contracts.length === 0) {
      listDiv.innerHTML = "<p>No active contracts found.</p>";
      return;
    }

    listDiv.innerHTML = contracts.map(c => `
            <div class="card">
                <button class="danger delete-btn" onclick="deleteContract('${c._id}')">Terminate / Delete</button>
                <strong>Contract Doc ID:</strong> ${c._id}<br>
                <strong>Contract Number:</strong> ${c.contract_number}<br>
                <hr>
                <strong>Linked Property Data:</strong> ${c.location.address}, ${c.location.city} ($${c.location.monthly_rent}/mo)<br>
                <strong>Linked Tenants Profile Data:</strong>
                <ul>
                    ${c.tenants.map(t => `<li>${t.name} — ${t.email}</li>`).join('')}
                </ul>
            </div>
        `).join('');
  }

  async function submitPerson() {
    await fetch(`${API_URL}/persons`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('p_name').value,
        email: document.getElementById('p_email').value
      })
    });
    loadDropdowns();
  }

  async function submitLocation() {
    await fetch(`${API_URL}/locations`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        address: document.getElementById('l_addr').value,
        city: document.getElementById('l_city').value,
        monthly_rent: parseFloat(document.getElementById('l_rent').value)
      })
    });
    loadDropdowns();
  }

  async function submitContract() {
    const tenantOptions = document.getElementById('c_tenants').options;
    const selectedTenants = [];
    for (let option of tenantOptions) {
      if (option.selected) selectedTenants.push(option.value);
    }

    await fetch(`${API_URL}/contracts`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contract_number: document.getElementById('c_num').value,
        location_id: document.getElementById('c_location').value,
        tenant_ids: selectedTenants
      })
    });
    loadContracts();
  }

  async function deleteContract(id) {
    await fetch(`${API_URL}/contracts/${id}`, { method: 'DELETE' });
    loadContracts();
  }

  // Initial Bootstrap Execution
  window.onload = () => {
    loadDropdowns();
    loadContracts();
  };
</script>
</body>
</html>
